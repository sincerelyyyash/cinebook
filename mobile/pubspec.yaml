name: cinebook
description: CineBook — AI-powered movie booking (customer app).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management / DI (manual providers — no codegen)
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # UI / design system
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.7

  # Utils
  intl: ^0.19.0
  collection: ^1.18.0
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Codegen (models only)
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
